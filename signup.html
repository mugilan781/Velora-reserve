<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — VÉLORA RESERVE</title>
  <meta name="description" content="Create your VÉLORA RESERVE account. Join the world of ultra-luxury resort experiences and exclusive sanctuary privileges.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="rtl.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

  <main id="main-content">
  <div class="auth-page">
    <!-- Back Button -->
    <a href="index.html" onclick="if(document.referrer) { history.back(); return false; }" class="auth-back-btn">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Back</span>
    </a>

    <div class="auth-container">

      <!-- Brand Header -->
      <div class="auth-brand">
        <a href="index.html" class="auth-brand-logo">
          <svg class="brand-logo-svg" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 2L14.85 8.15L21.6 9.15L16.7 13.93L17.85 20.65L12 17.5L6.15 20.65L7.3 13.93L2.4 9.15L9.15 8.15L12 2Z" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="4" />
          </svg>
          <span class="brand-text-velora">VÉLORA</span><span class="brand-text-reserve">RESERVE</span>
        </a>
        <h1 class="auth-title">Join the <em>Reserve</em></h1>
        <p class="auth-subtitle">Create your sanctuary account</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card">

        <!-- Alert Banner -->
        <div class="auth-alert-banner" id="signup-alert">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span></span>
        </div>

        <!-- Signup Form -->
        <form class="auth-form" id="signup-form" novalidate>

          <!-- Full Name -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="signup-name">Full Name</label>
            <div class="auth-input-wrap">
              <input type="text" class="auth-form-input" id="signup-name" placeholder="Your full name" required autocomplete="name">
            </div>
          </div>

          <!-- Email -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="signup-email">Email Address</label>
            <div class="auth-input-wrap">
              <input type="email" class="auth-form-input" id="signup-email" placeholder="your@email.com" required autocomplete="email">
            </div>
          </div>

          <!-- Mobile -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="signup-mobile">Mobile Number</label>
            <div class="auth-input-wrap">
              <input type="tel" class="auth-form-input" id="signup-mobile" placeholder="+91 98400 12345" required autocomplete="tel">
            </div>
          </div>

          <!-- Password -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="signup-password">Password</label>
            <div class="auth-input-wrap">
              <input type="password" class="auth-form-input" id="signup-password" placeholder="Create a strong password" required autocomplete="new-password" style="padding-right: 44px;">
              <button type="button" class="auth-password-toggle" id="signup-toggle-password" aria-label="Toggle password visibility">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <!-- Password Strength Meter -->
            <div class="auth-password-strength">
              <div class="auth-strength-bar"></div>
              <div class="auth-strength-bar"></div>
              <div class="auth-strength-bar"></div>
              <div class="auth-strength-bar"></div>
            </div>
            <div class="auth-strength-text"></div>
          </div>

          <!-- Confirm Password -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="signup-confirm">Confirm Password</label>
            <div class="auth-input-wrap">
              <input type="password" class="auth-form-input" id="signup-confirm" placeholder="Re-enter your password" required autocomplete="new-password" style="padding-right: 44px;">
              <button type="button" class="auth-password-toggle" id="signup-toggle-confirm" aria-label="Toggle password visibility">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="auth-submit-btn">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="auth-divider" style="margin: var(--space-lg) 0;">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">or continue with</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- Google Button -->
        <button class="auth-google-btn" id="signup-google-btn">
          <svg aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <!-- Footer Text -->
      <p class="auth-footer-text">
        Already have an account? <a href="login.html">Sign In</a>
      </p>

    </div>
  </div>
  </main>

  <script src="theme.js"></script>
  <script src="rtl-toggle.js"></script>
  <script src="auth.js"></script>
</body>
</html>
