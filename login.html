<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VÉLORA RESERVE</title>
  <meta name="description" content="Sign in to your VÉLORA RESERVE account. Access exclusive reservations, luxury concierge services, and personalized travel experiences.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">

      <!-- Brand Header -->
      <div class="auth-brand">
        <a href="index.html" class="auth-brand-logo">
          <svg class="brand-logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 2L14.85 8.15L21.6 9.15L16.7 13.93L17.85 20.65L12 17.5L6.15 20.65L7.3 13.93L2.4 9.15L9.15 8.15L12 2Z" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="4" />
          </svg>
          <span class="brand-text-velora">VÉLORA</span><span class="brand-text-reserve">RESERVE</span>
        </a>
        <h1 class="auth-title">Welcome <em>Back</em></h1>
        <p class="auth-subtitle">Sign in to your sanctuary</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card">

        <!-- Success Banner (after signup redirect) -->
        <div class="auth-success-banner" id="login-success" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>Account created successfully. Please sign in.</span>
        </div>

        <!-- Alert Banner -->
        <div class="auth-alert-banner" id="login-alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span></span>
        </div>

        <!-- Login Form -->
        <form class="auth-form" id="login-form" novalidate>

          <!-- Email -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="login-email">Email Address</label>
            <div class="auth-input-wrap">
              <input type="email" class="auth-form-input" id="login-email" placeholder="your@email.com" required autocomplete="email">
            </div>
          </div>

          <!-- Password -->
          <div class="auth-form-group">
            <label class="auth-form-label" for="login-password">Password</label>
            <div class="auth-input-wrap">
              <input type="password" class="auth-form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 44px;">
              <button type="button" class="auth-password-toggle" id="login-toggle-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Options Row -->
          <div class="auth-options-row">
            <label class="auth-remember">
              <input type="checkbox" id="login-remember">
              <span>Remember me</span>
            </label>
            <a href="forgot-password.html" class="auth-forgot-link">Forgot Password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="auth-submit-btn">Sign In</button>
        </form>

        <!-- Divider -->
        <div class="auth-divider" style="margin: var(--space-lg) 0;">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">or continue with</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- Google Button -->
        <button class="auth-google-btn" id="login-google-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <!-- Footer Text -->
      <p class="auth-footer-text">
        Don't have an account? <a href="signup.html">Create One</a>
      </p>

    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
